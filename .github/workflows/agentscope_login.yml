name: Agentscope Auto Login (Username/Password)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  auto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install playwright requests && playwright install --with-deps chromium
      - name: Run script
        env:
          AGENTSCOPE_USERNAME: ${{ secrets.AGENTSCOPE_USERNAME }}
          AGENTSCOPE_PASSWORD: ${{ secrets.AGENTSCOPE_PASSWORD }}
          HEADLESS: 'true'
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python agentscope_login.py
      - name: Upload screenshots (if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
