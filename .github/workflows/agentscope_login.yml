name: Agentscope Auto Login

on:
  schedule:
    - cron: '16 */3 * * *'
  workflow_dispatch:

jobs:
  auto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei fonts-noto-cjk
          pip install playwright requests
          playwright install chromium
      - name: Run script
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          HEADLESS: 'true'
          BUTTON_DEPLOY: '一键部署 QwenPaw,一键部署QwenPaw'
          BUTTON_QWENPAW: '打开QWENPAW,打开 QWENPAW,Open QWENPAW'
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python agentscope_login.py
      - name: Upload screenshots (always)
        if: always()   # 无论成功失败都上传
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
